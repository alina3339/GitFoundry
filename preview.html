<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: radial-gradient(ellipse at center, #0c0c0c 0%, #050505 80%); color: #888;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; padding: 48px 32px; min-height: 100vh; }
  h1 { font-weight: 300; letter-spacing: 0.15em; text-transform: uppercase; font-size: 11px; color: #888; text-align: center; margin-bottom: 6px; }
  .sub { text-align: center; color: #555; font-size: 10px; letter-spacing: 0.1em; margin-bottom: 56px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; max-width: 1500px; margin: 0 auto; }
  .tile { background: #0a0a0a; border: 1px solid #1f1f1f; border-radius: 2px; padding: 28px; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; transition: border-color 0.4s; }
  .tile:hover { border-color: #333; }
  .tile svg { width: 100%; height: 100%; display: block; }
  .label { margin-top: 20px; font-size: 10px; color: #666; letter-spacing: 0.15em; text-transform: uppercase; text-align: center; }
</style></head>
<body>
  <h1>GitFoundry · Vitruvian</h1>
  <p class="sub">Continuous Orbital Motion</p>
  <div class="grid"><div><div class="tile"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <!--
    GitFoundry Vitruvian Geometric — Continuous Orbital Motion
    Concentric circles stay still (rotation invisible on a circle), but the
    inscribed square + diagonals + tick layers rotate at different speeds.
    Comet arcs sweep around. Whole composition breathes gently.
  -->
  <style>
    .s1_stage { transform-origin: 300px 300px; animation: s1_breathe 7s ease-in-out infinite; }
    .s1_spin  { transform-origin: 300px 300px; animation-timing-function: linear; animation-iteration-count: infinite; will-change: transform; }
    .s1_s1 { animation-name: s1_spin;     animation-duration: 18s; }
    .s1_s2 { animation-name: s1_spin-rev; animation-duration: 26s; }
    .s1_s3 { animation-name: s1_spin;     animation-duration: 12s; }
    .s1_s4 { animation-name: s1_spin-rev; animation-duration: 9s;  }
    .s1_s5 { animation-name: s1_spin;     animation-duration: 40s; }

    @keyframes s1_spin     { to { transform: rotate(360deg); } }
    @keyframes s1_spin-rev { to { transform: rotate(-360deg); } }
    @keyframes s1_breathe {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.008); }
    }

    @media (prefers-reduced-motion: reduce) {
      .s1_stage, .s1_spin { animation: none; }
    }
  </style>

  <defs>
    <linearGradient id="s1_comet" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="60%"  stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="92%"  stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <g class="s1_stage">
    <g stroke="#ffffff" fill="none">

      <!-- Static concentric circles (rotation is invisible on a circle) -->
      <circle cx="300" cy="300" r="285" stroke-width="0.7"/>
      <circle cx="300" cy="300" r="176" stroke-width="0.55"/>
      <circle cx="300" cy="300" r="109" stroke-width="0.45"/>
      <circle cx="300" cy="300" r="67"  stroke-width="0.35"/>
      <circle cx="300" cy="300" r="41"  stroke-width="0.3"/>

      <!-- Inscribed square + diagonals — slow rotation -->
      <g class="s1_spin s1_s5">
        <rect x="87" y="87" width="426" height="426" stroke-width="0.55"/>
        <line x1="87"  y1="87"  x2="513" y2="513" stroke-width="0.35"/>
        <line x1="513" y1="87"  x2="87"  y2="513" stroke-width="0.35"/>
      </g>

      <!-- Tick ring around r=176 — counter-rotating -->
      <g class="s1_spin s1_s2">
        <line x1="124" y1="295" x2="124" y2="305" stroke-width="0.6"/>
        <line x1="176" y1="295" x2="176" y2="305" stroke-width="0.6"/>
        <line x1="424" y1="295" x2="424" y2="305" stroke-width="0.6"/>
        <line x1="476" y1="295" x2="476" y2="305" stroke-width="0.6"/>
        <line x1="295" y1="124" x2="305" y2="124" stroke-width="0.6"/>
        <line x1="295" y1="176" x2="305" y2="176" stroke-width="0.6"/>
        <line x1="295" y1="424" x2="305" y2="424" stroke-width="0.6"/>
        <line x1="295" y1="476" x2="305" y2="476" stroke-width="0.6"/>
      </g>

      <!-- Principal axes — rotate slowly -->
      <g class="s1_spin s1_s1" opacity="0.7">
        <line x1="5"   y1="300" x2="595" y2="300" stroke-width="0.6"/>
        <line x1="300" y1="5"   x2="300" y2="595" stroke-width="0.6"/>
      </g>

      <!-- Comet sweep on outer circle -->
      <g class="s1_spin s1_s3">
        <circle cx="300" cy="300" r="285" stroke="url(#s1_comet)" stroke-width="2" stroke-linecap="round"
                pathLength="1000" stroke-dasharray="320 680"/>
        <circle cx="585" cy="300" r="2.4" fill="#ffffff"/>
      </g>

      <!-- Faster inner comet on r=176 -->
      <g class="s1_spin s1_s4">
        <circle cx="300" cy="300" r="176" stroke="#ffffff" stroke-width="0.9"
                pathLength="1000" stroke-dasharray="50 950" stroke-linecap="round" opacity="0.7"/>
        <circle cx="476" cy="300" r="1.6" fill="#ffffff"/>
      </g>

      <!-- Centre crosshair — static, sharp -->
      <circle cx="300" cy="300" r="4" stroke-width="1.2"/>
      <line x1="290" y1="300" x2="310" y2="300" stroke-width="1.2"/>
      <line x1="300" y1="290" x2="300" y2="310" stroke-width="1.2"/>

      <!-- Corner registration marks — static frame of reference -->
      <g stroke-width="1">
        <line x1="10"  y1="10"  x2="40"  y2="10"/>
        <line x1="10"  y1="10"  x2="10"  y2="40"/>
        <line x1="590" y1="10"  x2="560" y2="10"/>
        <line x1="590" y1="10"  x2="590" y2="40"/>
        <line x1="10"  y1="590" x2="40"  y2="590"/>
        <line x1="10"  y1="590" x2="10"  y2="560"/>
        <line x1="590" y1="590" x2="560" y2="590"/>
        <line x1="590" y1="590" x2="590" y2="560"/>
      </g>

    </g>
  </g>
</svg>
</div><div class="label">GEOMETRIC</div></div><div><div class="tile"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">

  <g class="s2_stage">

      <!-- Seed of Life — 7 circles rotate as one unit -->

        <!-- Hexagon sits in the same frame as the seed -->
        <path d="M 300 190 L 395 245 L 395 355 L 300 410 L 205 355 L 205 245 Z" stroke-width="0.4"/>
      </g>

      <!-- Hexagram (star of David) — counter-rotating inside -->
      <g class="s2_spin s2_star" opacity="0.85">

      <!-- Inner comet -->

      <!-- Static axes outside the bloom -->

        <line x1="10"  y1="10"  x2="40"  y2="10"/>
        <line x1="10"  y1="10"  x2="10"  y2="40"/>
        <line x1="590" y1="10"  x2="560" y2="10"/>
        <line x1="590" y1="10"  x2="590" y2="40"/>
        <line x1="10"  y1="590" x2="40"  y2="590"/>
        <line x1="10"  y1="590" x2="10"  y2="560"/>
        <line x1="590" y1="590" x2="560" y2="590"/>
        <line x1="590" y1="590" x2="590" y2="560"/>
      </g>

    </g>
  </g>
</svg>

</div><div class="label">MECHANICAL</div></div><div><div class="tile"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <!--
    GitFoundry Vitruvian — Golden Ratio — v3
    Mathematically correct φ-rectangle (480 × 480/φ) with properly nested
    squares and continuous Fibonacci spiral converging on the eye.
    Spiral and rectangle stay anchored. Comets orbit the figure centre.
  -->
  <style>
    .s4_stage { transform-origin: 300px 300px; animation: s4_breathe 7s ease-in-out infinite; }
    .s4_orbit { transform-origin: 300.00px 300.00px; animation-timing-function: linear; animation-iteration-count: infinite; will-change: transform; }
    .s4_o1 { animation-name: s4_spin;     animation-duration: 14s; }
    .s4_o2 { animation-name: s4_spin-rev; animation-duration: 22s; }
    .s4_satellite { transform-origin: 426.69px 361.77px; animation: s4_spin 9s linear infinite; will-change: transform; }
    .s4_grid-shimmer { animation: s4_shimmer 5s ease-in-out infinite; }
    .s4_eye-pulse { transform-origin: center; transform-box: fill-box; animation: s4_pulse 3s ease-in-out infinite; }
    .s4_eye-ring  { transform-origin: center; transform-box: fill-box; animation: s4_ring-pulse 3s ease-in-out infinite; }

    @keyframes s4_spin     { to { transform: rotate(360deg);  } }
