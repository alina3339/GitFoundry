<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <!--
    GitFoundry Vitruvian — Flower of Life — Continuous Motion
    The seed pattern rotates slowly. Hexagram counter-rotates inside.
    Comet sweeps the boundary. Whole composition breathes.
  -->
  <style>
    .stage { transform-origin: center; transform-box: view-box; animation: breathe 7s ease-in-out infinite; }
    .spin  { transform-origin: center; transform-box: view-box; animation-timing-function: linear; animation-iteration-count: infinite; will-change: transform; }
    .seed { animation-name: spin-rev; animation-duration: 50s; }
    .hex  { animation-name: spin;     animation-duration: 35s; }
    .star { animation-name: spin-rev; animation-duration: 22s; }
    .comet1 { animation-name: spin;   animation-duration: 14s; }
    .comet2 { animation-name: spin-rev; animation-duration: 9s; }

    @keyframes spin     { to { transform: rotate(360deg); } }
    @keyframes spin-rev { to { transform: rotate(-360deg); } }
    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.008); }
    }

    @media (prefers-reduced-motion: reduce) {
      .stage, .spin { animation: none; }
    }
  </style>

  <defs>
    <linearGradient id="comet-f" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#f4efe5" stop-opacity="0"/>
      <stop offset="60%"  stop-color="#f4efe5" stop-opacity="0.05"/>
      <stop offset="92%"  stop-color="#f4efe5" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#f4efe5" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <g class="stage">
    <g stroke="#f4efe5" fill="none">

      <!-- Static boundary -->
      <circle cx="300" cy="300" r="220" stroke-width="0.6"/>

      <!-- Comet sweep on boundary -->
      <g class="spin comet1">
        <circle cx="300" cy="300" r="220" stroke="url(#comet-f)" stroke-width="1.8" stroke-linecap="round"
                pathLength="1000" stroke-dasharray="280 720"/>
        <circle cx="520" cy="300" r="2.2" fill="#f4efe5"/>
      </g>

      <!-- Seed of Life — 7 circles rotate as one unit -->
      <g class="spin seed">
        <circle cx="300" cy="300" r="110" stroke-width="0.5"/>
        <circle cx="300" cy="190" r="110" stroke-width="0.45"/>
        <circle cx="395" cy="245" r="110" stroke-width="0.45"/>
        <circle cx="395" cy="355" r="110" stroke-width="0.45"/>
        <circle cx="300" cy="410" r="110" stroke-width="0.45"/>
        <circle cx="205" cy="355" r="110" stroke-width="0.45"/>
        <circle cx="205" cy="245" r="110" stroke-width="0.45"/>
        <!-- Hexagon sits in the same frame as the seed -->
        <path d="M 300 190 L 395 245 L 395 355 L 300 410 L 205 355 L 205 245 Z" stroke-width="0.4"/>
      </g>

      <!-- Hexagram (star of David) — counter-rotating inside -->
      <g class="spin star" opacity="0.85">
        <path d="M 300 190 L 395 355 L 205 355 Z" stroke-width="0.3"/>
        <path d="M 300 410 L 205 245 L 395 245 Z" stroke-width="0.3"/>
      </g>

      <!-- Inner comet -->
      <g class="spin comet2" opacity="0.65">
        <circle cx="300" cy="300" r="110" stroke="#f4efe5" stroke-width="0.8"
                pathLength="1000" stroke-dasharray="40 960" stroke-linecap="round"/>
        <circle cx="410" cy="300" r="1.5" fill="#f4efe5"/>
      </g>

      <!-- Static axes outside the bloom -->
      <g class="spin hex" opacity="0.4">
        <line x1="60"  y1="300" x2="540" y2="300" stroke-width="0.5"/>
        <line x1="300" y1="60"  x2="300" y2="540" stroke-width="0.5"/>
      </g>

      <!-- Centre dot -->
      <circle cx="300" cy="300" r="3" stroke-width="1"/>

      <!-- Corner registration marks (static) -->
      <g stroke-width="1">
        <line x1="10"  y1="10"  x2="40"  y2="10"/>
        <line x1="10"  y1="10"  x2="10"  y2="40"/>
        <line x1="590" y1="10"  x2="560" y2="10"/>
        <line x1="590" y1="10"  x2="590" y2="40"/>
        <line x1="10"  y1="590" x2="40"  y2="590"/>
        <line x1="10"  y1="590" x2="10"  y2="560"/>
        <line x1="590" y1="590" x2="560" y2="590"/>
        <line x1="590" y1="590" x2="590" y2="560"/>
      </g>

    </g>
  </g>
</svg>
