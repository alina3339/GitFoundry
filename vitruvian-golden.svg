<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <!--
    GitFoundry Vitruvian — Golden Ratio — v3
    Mathematically correct φ-rectangle (480 × 480/φ) with properly nested
    squares and continuous Fibonacci spiral converging on the eye.
    Spiral and rectangle stay anchored. Comets orbit the figure centre.
  -->
  <style>
    .stage { transform-origin: center; transform-box: view-box; animation: breathe 7s ease-in-out infinite; }
    .orbit { transform-origin: center; transform-box: view-box; animation-timing-function: linear; animation-iteration-count: infinite; will-change: transform; }
    .o1 { animation-name: spin;     animation-duration: 14s; }
    .o2 { animation-name: spin-rev; animation-duration: 22s; }
    .satellite { transform-origin: 426.69px 361.77px; transform-box: view-box; animation: spin 9s linear infinite; will-change: transform; }
    .grid-shimmer { animation: shimmer 5s ease-in-out infinite; }
    .eye-pulse { transform-origin: center; transform-box: fill-box; animation: pulse 3s ease-in-out infinite; }
    .eye-ring  { transform-origin: center; transform-box: fill-box; animation: ring-pulse 3s ease-in-out infinite; }

    @keyframes spin     { to { transform: rotate(360deg);  } }
    @keyframes spin-rev { to { transform: rotate(-360deg); } }
    @keyframes breathe {
      0%, 100% { transform: scale(1);     }
      50%      { transform: scale(1.008); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1);   opacity: 1;   }
      50%      { transform: scale(1.6); opacity: 0.4; }
    }
    @keyframes ring-pulse {
      0%, 100% { transform: scale(1);   opacity: 0.7; }
      50%      { transform: scale(1.3); opacity: 0.2; }
    }
    @keyframes shimmer {
      0%, 100% { opacity: 0.55; }
      50%      { opacity: 0.25; }
    }

    @media (prefers-reduced-motion: reduce) {
      .stage, .orbit, .satellite, .grid-shimmer, .eye-pulse, .eye-ring { animation: none; }
    }
  </style>

  <defs>
    <linearGradient id="comet-gold-a" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#f4efe5" stop-opacity="0"/>
      <stop offset="60%"  stop-color="#f4efe5" stop-opacity="0.05"/>
      <stop offset="92%"  stop-color="#f4efe5" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#f4efe5" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="comet-gold-b" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#f4efe5" stop-opacity="0"/>
      <stop offset="80%"  stop-color="#f4efe5" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#f4efe5" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <g class="stage">
    <g stroke="#f4efe5" fill="none">

      <!-- Golden rectangle (480 × 480/φ ≈ 297) -->
      <rect x="60.0" y="151.67" width="480.0" height="296.66" stroke-width="0.55"/>

      <!-- Phi subdivisions — one line per square boundary, shimmering -->
      <g class="grid-shimmer">
        <line x1="356.66" y1="151.67" x2="356.66" y2="448.33" stroke-width="0.45"/>
        <line x1="356.66" y1="335.02" x2="540.00" y2="335.02" stroke-width="0.41"/>
        <line x1="426.69" y1="335.02" x2="426.69" y2="448.33" stroke-width="0.37"/>
        <line x1="356.66" y1="378.30" x2="426.69" y2="378.30" stroke-width="0.33"/>
        <line x1="399.94" y1="335.02" x2="399.94" y2="378.30" stroke-width="0.29"/>
      </g>

      <!-- Measurement ticks on the golden ratio split (at φ along width) -->
      <line x1="356.66" y1="448.33" x2="356.66" y2="458.33" stroke-width="0.5"/>
      <line x1="60.0" y1="454.33" x2="356.66" y2="454.33" stroke-width="0.3"/>
      <line x1="356.66" y1="454.33" x2="540.0" y2="454.33" stroke-width="0.3"/>

      <!-- Static Fibonacci spiral -->
      <path d="M 60.00 448.33 A 296.66 296.66 0 0 1 356.66 151.67" stroke-width="0.70"/>
      <path d="M 356.66 151.67 A 183.34 183.34 0 0 1 540.00 335.02" stroke-width="0.64"/>
      <path d="M 540.00 335.02 A 113.31 113.31 0 0 1 426.69 448.33" stroke-width="0.58"/>
      <path d="M 426.69 448.33 A 70.03 70.03 0 0 1 356.66 378.30" stroke-width="0.52"/>
      <path d="M 356.66 378.30 A 43.28 43.28 0 0 1 399.94 335.02" stroke-width="0.46"/>
      <path d="M 399.94 335.02 A 26.75 26.75 0 0 1 426.69 361.77" stroke-width="0.40"/>

      <!-- Outer comet -->
      <g class="orbit o1">
        <circle cx="300.00" cy="300.00" r="280" stroke="url(#comet-gold-a)" stroke-width="1.8" stroke-linecap="round"
                pathLength="1000" stroke-dasharray="280 720"/>
        <circle cx="580.00" cy="300.00" r="2.2" fill="#f4efe5"/>
      </g>

      <!-- Counter-rotating mid comet -->
      <g class="orbit o2">
        <circle cx="300.00" cy="300.00" r="245" stroke="url(#comet-gold-b)" stroke-width="1" stroke-linecap="round"
                pathLength="1000" stroke-dasharray="80 920" opacity="0.6"/>
        <circle cx="545.00" cy="300.00" r="1.5" fill="#f4efe5" opacity="0.8"/>
      </g>

      <!-- Satellite circling the eye -->
      <g class="satellite">
        <circle cx="456.69" cy="361.77" r="1.4" fill="#f4efe5" opacity="0.85"/>
      </g>

      <!-- The eye — pulses at the spiral's true convergence point -->
      <circle class="eye-ring"  cx="426.69" cy="361.77" r="8" stroke-width="0.35"/>
      <circle class="eye-pulse" cx="426.69" cy="361.77" r="2" stroke-width="0.8" fill="#f4efe5"/>

      <!-- Corner registration marks -->
      <g stroke-width="1">
        <line x1="10"  y1="10"  x2="40"  y2="10"/>
        <line x1="10"  y1="10"  x2="10"  y2="40"/>
        <line x1="590" y1="10"  x2="560" y2="10"/>
        <line x1="590" y1="10"  x2="590" y2="40"/>
        <line x1="10"  y1="590" x2="40"  y2="590"/>
        <line x1="10"  y1="590" x2="10"  y2="560"/>
        <line x1="590" y1="590" x2="560" y2="590"/>
        <line x1="590" y1="590" x2="590" y2="560"/>
      </g>

    </g>
  </g>
</svg>
